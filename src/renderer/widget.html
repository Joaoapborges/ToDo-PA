<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget</title>
    <link rel="stylesheet" href="widget.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="widget.css">
</head>
<!-- modal de confirmar eliminar -->
<div id="widget-confirm-modal" class="modal">
    <div class="modal-content confirm-modal-content">
        <p class="confirm-message">Tens a certeza que queres apagar esta tarefa?</p>
        <div class="confirm-actions">
            <button id="widget-btn-confirm-delete" class="btn primary">Apagar</button>
            <button id="widget-btn-cancel-delete" class="btn secondary">Cancelar</button>
        </div>
    </div>
</div>

<!-- nova tarefa widget -->
<div id="widget-task-modal" class="modal">
    <div class="modal-content">
        <span class="close-button" id="widget-close-modal">&times;</span>
        <div class="task-form-section">
            <h2>Adicionar Tarefa</h2>
            <form id="widget-task-form">
                <input type="hidden" id="widget-item-id">

                <div class="form-group">
                    <label for="widget-item-name">Nome da Tarefa *</label>
                    <input type="text" id="widget-item-name" required placeholder="Ex: Pagar a luz">
                </div>

                <div class="form-group">
                    <label for="widget-item-notes">Notas</label>
                    <textarea id="widget-item-notes" rows="3" placeholder="Detalhes adicionais..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn primary full-width">Guardar Tarefa</button>
                </div>
            </form>
        </div>
    </div>
</div>
<body>
    <div class="widget-container">
        
        <!-- Barra de topo: arrastar + pin + fechar -->
        <div class="widget-titlebar" id="widget-titlebar">
            <span class="widget-title">To Do</span>
            <div class="widget-controls">
                <button id="btn-today-widget" class="widget-btn hidden" title="Voltar a hoje">📅</button>
                <button id="btn-pin" class="widget-btn" title="Fixar no topo">📌</button>
                <button id="btn-close-widget" class="widget-btn" title="Fechar">✕</button>
            </div>
        </div>

        <!-- Navegação de dia -->
        <div class="widget-date-nav">
            <button id="widget-prev-day" class="widget-nav-btn">‹</button>
            <span id="widget-date-label">Hoje</span>
            <button id="widget-next-day" class="widget-nav-btn">›</button>
        </div>

        <!-- Lista de tarefas -->
        <ul id="widget-task-list" class="widget-task-list">
            <!-- tarefas renderizadas via JS -->
        </ul>

        <!-- Botão adicionar -->
        <div class="widget-footer">
            <button id="btn-widget-add" class="widget-add-btn">+ Nova Tarefa neste dia</button>
        </div>

    </div>

    <script src="./js/widget.js"></script>
</body>
</html>
